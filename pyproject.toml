[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '/(\.git|\.hg|\.mypy_cache|\.tox|\.venv|_build|buck-out|build|dist)/'

[tool.pytest.ini_options]
testpaths = ["uds"]
python_files = "test_*.py"
addopts = "-v --html=logs/test_report.html --self-contained-html"
